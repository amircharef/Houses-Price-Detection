<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>House Price Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
    <div class="bg-shape bg-a"></div>
    <div class="bg-shape bg-b"></div>

    <main class="layout">
        <section class="hero">
            <p class="eyebrow">AI Real Estate Estimation</p>
            <h1>Predict House Value in Seconds</h1>
            <p class="subtitle">
                Fill in the property details and get an instant price prediction from your trained model.
            </p>
        </section>

        <section class="card">
            <form id="predictForm" class="form-grid">
                <label>
                    Area (m2)
                    <input type="number" name="area_m2" min="10" step="1" required />
                </label>
                <label>
                    Bedrooms
                    <input type="number" name="bedrooms" min="0" step="1" required />
                </label>
                <label>
                    Bathrooms
                    <input type="number" name="bathrooms" min="0" step="1" required />
                </label>
                <label>
                    Floors
                    <input type="number" name="floors" min="1" step="1" required />
                </label>
                <label>
                    House Age (years)
                    <input type="number" name="age_years" min="0" step="1" required />
                </label>
                <label>
                    Distance to Center (km)
                    <input type="number" name="distance_to_center_km" min="0" step="0.1" required />
                </label>
                <label>
                    Garage
                    <select name="has_garage" required>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </label>
                <label>
                    Garden
                    <select name="has_garden" required>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </label>
                <label>
                    Neighborhood Score (1-10)
                    <input type="number" name="neighborhood_score" min="1" max="10" step="0.1" required />
                </label>

                <button type="submit" class="btn">Predict Price</button>
            </form>

            <div id="result" class="result" aria-live="polite">
                Enter values and click Predict Price.
            </div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>

</html>
